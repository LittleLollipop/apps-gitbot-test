apiVersion: apps/v1
kind: Deployment
metadata:
  name: testapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: testapp
  template:
    metadata:
      labels:
        app: testapp
    spec:
      containers:
      - name: testapp
        image: registry.example.com/testapp:1.0.0
        resources:
          limits:
            memory: 512Mi
          requests:
            memory: 256Mi
