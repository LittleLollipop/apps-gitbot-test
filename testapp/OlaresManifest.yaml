apiVersion: v1
kind: App
metadata:
  name: testapp
  version: 1.0.0
  appVersion: "1.0.0"
spec:
  displayName:
    zh: 测试应用
    en: Test App
  versionName: "1.0.0"
  summary:
    zh: 测试应用
    en: Test application
  description:
    zh: 用于测试的非 owner PR
    en: Non-owner PR for testing
